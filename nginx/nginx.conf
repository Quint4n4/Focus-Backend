# ─────────────────────────────────────────────────────────────────
# Focus API — Nginx Production Config
# ─────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /app/logs/nginx_error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /app/logs/nginx_access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size  20M;

    # ── Ocultar versión de Nginx ──
    server_tokens off;

    # ── Rate limiting zones ──
    # login_limit: 5 req/min por IP para el endpoint de login
    limit_req_zone  $binary_remote_addr  zone=login_limit:10m  rate=5r/m;
    # api_limit: 60 req/min por IP para la API en general
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m    rate=60r/m;
    # invite_limit: 10 req/hora para invitaciones
    limit_req_zone  $binary_remote_addr  zone=invite_limit:10m rate=10r/h;

    # ── Redirect HTTP → HTTPS ──
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS ──
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ──
        add_header  Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload"  always;
        add_header  X-Frame-Options            "DENY"                                           always;
        add_header  X-Content-Type-Options     "nosniff"                                        always;
        add_header  X-XSS-Protection           "1; mode=block"                                  always;
        add_header  Referrer-Policy            "strict-origin-when-cross-origin"                always;
        add_header  Permissions-Policy         "geolocation=(), microphone=(), camera=()"       always;

        # ── Honeypot — bloquear scanners comunes ──
        location ~* ^/(admin-backup|phpmyadmin|wp-admin|wp-login|\.env|\.git|config\.php) {
            return 404;
        }

        # ── Static files ──
        location /static/ {
            alias  /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Media files ──
        location /media/ {
            alias  /app/media/;
            expires 7d;
        }

        # ── Login endpoint — rate limited ──
        location = /api/auth/login/ {
            limit_req  zone=login_limit  burst=3  nodelay;
            limit_req_status 429;

            proxy_pass         http://web:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Invite endpoint — stricter rate limit ──
        location = /api/users/invite/ {
            limit_req  zone=invite_limit  burst=2  nodelay;
            limit_req_status 429;

            proxy_pass         http://web:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── All other API endpoints ──
        location /api/ {
            limit_req  zone=api_limit  burst=20  nodelay;
            limit_req_status 429;

            proxy_pass         http://web:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Admin (restrict in production) ──
        location /admin/ {
            # Uncomment to restrict by IP:
            # allow  YOUR_IP;
            # deny   all;
            proxy_pass         http://web:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Block everything else ──
        location / {
            return 404;
        }
    }
}
